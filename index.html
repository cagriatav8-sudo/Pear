<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pear System OS</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
        #boot-screen { text-align: center; transition: opacity 1s; }
        #pear-logo { font-size: 120px; display: inline-block; transition: 0.2s; }
        .bitten { clip-path: polygon(0% 0%, 100% 0%, 100% 30%, 75% 45%, 100% 60%, 100% 100%, 0% 100%); }
        #shop-screen { width: 100%; height: 100vh; background: #1a1a1a; padding: 40px; box-sizing: border-box; text-align: center; }
        .product-grid { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .card { background: #252525; border: 1px solid #444; border-radius: 15px; padding: 20px; width: 200px; }
        .buy-btn { background: #ffeb3b; color: #000; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 8px; font-weight: bold; }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 30px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; width: 300px; }
        input { padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div id="pear-logo">🍐</div>
        <h2 id="status-text">Sistem Başlatılıyor...</h2>
    </div>

    <div id="shop-screen" class="hidden">
        <h1>PEAR STORE</h1>
        <div class="product-grid">
            <div class="card">
                <h3>Pear Mouse</h3>
                <input type="number" id="q1" value="1" min="1" max="5">
                <button class="buy-btn" onclick="openPayment('Pear Mouse', 'q1')">SATIN AL</button>
            </div>
            <div class="card">
                <h3>Pear Klavye</h3>
                <input type="number" id="q2" value="1" min="1" max="5">
                <button class="buy-btn" onclick="openPayment('Pear Klavye', 'q2')">SATIN AL</button>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>Ödeme Bilgileri</h3>
            <input type="text" id="card-no" placeholder="Kart Numarası">
            <input type="text" id="tel-no" placeholder="Telefon">
            <input type="email" id="email-input" placeholder="Gmail Adresiniz">
            <button style="background: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer;" onclick="finish()">ONAYLA</button>
            <button style="background: none; color: red; border: none; cursor: pointer;" onclick="closeModal()">Vazgeç</button>
        </div>
    </div>

    <audio id="bite-sound" src="https://assets.mixkit.co/active_storage/sfx/2288/2288-preview.mp3"></audio>

    <script>
        const biteSound = document.getElementById('bite-sound');
        const logo = document.getElementById('pear-logo');
        let selectedProduct = "";

        window.onload = () => {
            setTimeout(() => {
                biteSound.play().catch(() => {});
                logo.classList.add('bitten');
                setTimeout(() => {
                    document.getElementById('boot-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('boot-screen').classList.add('hidden');
                        document.getElementById('shop-screen').classList.remove('hidden');
                    }, 1000);
                }, 1000);
            }, 2000);
        };

        function openPayment(name, id) {
            selectedProduct = name + " x" + document.getElementById(id).value;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function finish() {
            const email = document.getElementById('email-input').value;
            const tel = document.getElementById('tel-no').value;

            // BACKEND İSTEĞİ (Buradaki URL'yi backend'i yüklediğin yerle değiştireceksin)
            fetch('http://localhost:3000/satin-al', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urun: selectedProduct, email: email, telefon: tel })
            })
            .then(() => alert("Sipariş alındı ve arkadaşına iletildi!"))
            .catch(() => alert("Backend çalışmıyor veya bağlantı hatası!"));
            
            closeModal();
        }
    </script>
</body>
</html>
