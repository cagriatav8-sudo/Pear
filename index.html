<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pear Store - Space Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Segoe UI', sans-serif; }
        #space { position: fixed; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        .pear-fall { position: absolute; font-size: 30px; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; z-index: 1; position: relative; }
        .product-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); border: 2px solid #555; padding: 20px; border-radius: 15px; text-align: center; margin: 10px; width: 250px; }
        .stok-yok { color: #ff4d4d; font-weight: bold; margin-bottom: 10px; }
        
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; transition: 0.3s; }
        .admin-btn { position: fixed; right: 20px; top: 20px; background: gold; color: black; z-index: 100; }
        .main-btn { background: #00d4ff; color: white; margin-top: 20px; font-size: 18px; box-shadow: 0 0 10px #00d4ff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .white-screen { background: white; color: black; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; text-align: center; }
        
        .input-group { text-align: left; margin-bottom: 12px; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 3px; font-size: 14px; }
        .input-group input, .input-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .error { color: red; font-size: 11px; font-weight: bold; }

        .admin-box { max-height: 400px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 10px; }
        .gmail-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .sabit { background: #fff9c4 !important; border-left: 5px solid gold; }
    </style>
</head>
<body>

<div id="space"></div>
<button class="admin-btn" onclick="openAdmin()">🔒 Yetkili Girişi</button>

<div class="container">
    <h1 style="text-shadow: 0 0 15px #00d4ff;">🍐 PEAR STORE</h1>
    <div style="display: flex; flex-wrap: wrap; justify-content: center;">
        <div class="product-card"><h3>Pear Mouse</h3><p class="stok-yok">STOK YOK</p></div>
        <div class="product-card"><h3>Pear Keyboard</h3><p class="stok-yok">STOK YOK</p></div>
    </div>
    <button class="main-btn" onclick="openOrder()">🎨 3D Tasarım & Satın Alım</button>
</div>

<!-- DEV SİPARİŞ VE ÖDEME FORMU -->
<div id="orderModal" class="modal">
    <div class="white-screen">
        <div id="orderForm">
            <h2 style="margin-top:0;">🍐 Pear Sipariş Formu</h2>
            <hr>
            <!-- TASARIM BİLGİLERİ -->
            <div class="input-group">
                <label>3D Tasarım İsteğiniz:</label>
                <textarea id="orderText" placeholder="İstediğiniz modeli tarif edin..."></textarea>
            </div>
            <div class="input-group">
                <label>Tasarımcıya Not:</label>
                <textarea id="orderNote" placeholder="Ekstra belirtmek istediğiniz detaylar..."></textarea>
            </div>
            <hr>
            <!-- ÖDEME VE İLETİŞİM BİLGİLERİ -->
            <div class="input-group">
                <label>E-Posta Adresi:</label>
                <input type="email" id="uEmail" placeholder="ornek@gmail.com">
            </div>
            <div class="input-group">
                <label>Kart Numarası (16 Hane):</label>
                <input type="number" id="uCard">
                <div id="errCard" class="error"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1">
                    <label>Posta Kodu:</label>
                    <input type="number" id="uZip">
                    <div id="errZip" class="error"></div>
                </div>
                <div class="input-group" style="flex:1">
                    <label>SKT (MM/YY):</label>
                    <input type="text" id="uDate" placeholder="05/28">
                </div>
            </div>
            <p style="font-size: 11px; text-align: left;">
                <input type="checkbox" id="uTerms"> Şart ve Koşulları kabul ediyorum. (jsadıkhjasıkdhajd)
            </p>
            <button onclick="submitOrder()" style="background: #28a745; color: white; width: 100%; padding: 15px; font-size: 16px;">SİPARİŞİ TAMAMLA</button>
            <button onclick="closeModal('orderModal')" style="background:none; color:gray; margin-top:10px;">Vazgeç</button>
        </div>

        <!-- BAŞARI EKRANI -->
        <div id="successBox" style="display:none;">
            <div style="font-size:60px; color:#28a745;">✔</div>
            <h3>Siparişiniz Alındı!</h3>
            <p>Tasarımınız ve ödemeniz başarıyla yetkiliye iletildi.</p>
            <button onclick="closeModal('orderModal')" style="background:#007bff; color:white;">Ana Menüye Dön</button>
        </div>
    </div>
</div>

<!-- YETKİLİ PANELİ -->
<div id="adminModal" class="modal">
    <div class="white-screen" style="max-width: 600px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">👑 Yetkili Paneli</h2>
            <button onclick="closeModal('adminModal')" style="background:red; color:white;">KAPAT</button>
        </div>
        <div id="adminList" class="admin-box"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('pear_final_v1')) || [];

    function save() { localStorage.setItem('pear_final_v1', JSON.stringify(db)); }

    // UZAY EFEKTİ
    const space = document.getElementById('space');
    for(let i=0; i<25; i++) {
        let p = document.createElement('div'); p.className = 'pear-fall'; p.innerHTML = '🍐';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (Math.random() * 3 + 2) + 's';
        space.appendChild(p);
    }

    function openOrder() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeModal(id) { 
        document.getElementById(id).style.display = 'none';
        document.getElementById('orderForm').style.display = 'block';
        document.getElementById('successBox').style.display = 'none';
    }

    function submitOrder() {
        let text = document.getElementById('orderText').value;
        let note = document.getElementById('orderNote').value;
        let email = document.getElementById('uEmail').value;
        let card = document.getElementById('uCard').value;
        let zip = document.getElementById('uZip').value;
        let date = document.getElementById('uDate').value;
        let terms = document.getElementById('uTerms').checked;

        if(card.length === 16 && zip.length === 5 && terms && text) {
            db.push({
                id: Date.now(),
                title: "📦 YENİ SİPARİŞ: " + text,
                info: `Email: ${email} | Not: ${note} | Kart: ${card.substring(0,4)}...`,
                fix: false
            });
            save();
            document.getElementById('orderForm').style.display = 'none';
            document.getElementById('successBox').style.display = 'block';
        } else {
            alert("Lütfen tüm alanları (16 hane kart, 5 hane posta kodu) doğru doldurun ve şartları onaylayın!");
        }
    }

    function openAdmin() {
        if(prompt("Şifre:") === "piır") {
            document.getElementById('adminModal').style.display = 'flex';
            render();
        } else { alert("Hatalı Şifre!"); }
    }

    function render() {
        const list = document.getElementById('adminList');
        list.innerHTML = "";
        let sorted = [...db].sort((a,b) => b.fix - a.fix);
        if(sorted.length === 0) { list.innerHTML = "<p style='padding:20px;'>Henüz sipariş yok Efendim.</p>"; return; }

        sorted.forEach(item => {
            let row = document.createElement('div');
            row.className = `gmail-row ${item.fix ? 'sabit' : ''}`;
            row.innerHTML = `
                <div style="flex:1">
                    <strong>${item.title}</strong><br>
                    <small style="color:#666;">${item.info}</small>
                </div>
                <button onclick="pin(${item.id})" style="background:none; font-size:20px;">${item.fix ? '📌' : '📍'}</button>
                <button onclick="del(${item.id})" style="background:none; font-size:20px;">🗑️</button>
            `;
            list.appendChild(row);
        });
    }

    function del(id) { db = db.filter(x => x.id !== id); save(); render(); }
    function pin(id) { let i = db.find(x => x.id === id); i.fix = !i.fix; save(); render(); }
</script>

</body>
</html>
